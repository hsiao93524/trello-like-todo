<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Trello Local</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="app-header">
    <div class="app-title" id="appTitle">Weekly Trello Local</div>

    <div class="locale-picker">
        <span class="locale-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
                <circle
                    cx="12"
                    cy="12"
                    r="9"
                    stroke="currentColor"
                    stroke-width="2"
                ></circle>
                <path
                    d="M3 12h18"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                ></path>
                <path
                    d="M12 3c2.2 2.4 3.4 5.5 3.4 9S14.2 18.6 12 21c-2.2-2.4-3.4-5.5-3.4-9S9.8 5.4 12 3Z"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linejoin="round"
                ></path>
            </svg>
        </span>

        <select id="localeSelect" aria-label="Language"></select>
    </div>
</header>

<div class="toolbar">

    <input type="text" id="taskTitle" placeholder="Task title">

    <input type="date" id="taskDate">

    <button id="addTaskButton" onclick="addTask()">Add Task</button>

    <div class="week-nav">
        <button id="previousWeekButton" onclick="changeWeek(-1)">Previous Week</button>

        <div id="currentWeekLabel">Current Week</div>

        <button id="nextWeekButton" onclick="changeWeek(1)">Next Week</button>
    </div>

</div>

<div class="board-wrapper">
    <div class="board" id="board"></div>
</div>

<div class="history">
    <h2 id="historyTitle">History</h2>

    <div id="historyList"></div>
</div>

<script src="js/i18n.js"></script>
<script src="js/color-utils.js"></script>
<script src="js/date-utils.js"></script>
<script src="js/storage.js"></script>
<script src="js/color-panel.js"></script>
<script src="js/history-ui.js"></script>
<script src="js/board-ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
